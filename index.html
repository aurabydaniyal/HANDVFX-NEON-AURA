<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANDVFX ∞ NEON AURA — Dual Mode AR</title>
    
    <!-- MediaPipe Hands CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        :root {
            --bg-color: #050510;
            --text-color: #ffffff;
            --glass-bg: rgba(20, 25, 40, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-blur: blur(16px);
            --accent: #00ffcc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* Camera Feed */
        .input_video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            z-index: 0;
        }

        /* Canvas Layers */
        #bgCanvas, #mainCanvas, #narutoCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        #bgCanvas { z-index: 1; pointer-events: none; display: none; }
        #mainCanvas { z-index: 5; pointer-events: none; display: none; }
        #narutoCanvas { z-index: 2; pointer-events: none; display: none; }

        /* Video Effect Layers (Naruto mode) */
        .fx {
            position: absolute;
            height: auto;
            top: 0;
            left: 0;
            transform: translate(-50%, -50%) scaleX(-1);
            pointer-events: none;
            display: none;
            mix-blend-mode: screen;
            z-index: 25;
        }
        #n { width: 1600px; }
        #s { width: 2400px; }

        /* UI Overlays */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }

        .panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 15px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            min-width: 180px;
        }
        .stat:last-child { margin-bottom: 0; }
        .stat span.val { font-weight: bold; color: var(--accent); }

        /* Mode Indicator */
        .mode-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 40px;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 10;
            font-family: monospace;
            border: 1px solid rgba(0,255,204,0.3);
        }
        .mode-badge span { color: #00ffcc; }

        /* Themes */
        #themes {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 8px;
            transition: opacity 0.5s;
        }

        .theme-btn {
            background: transparent;
            border: 1px solid transparent;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s ease;
            font-weight: 500;
        }
        
        .theme-btn.active {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.3);
            text-shadow: 0 0 10px white;
        }

        /* Start Overlay */
        #startOverlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000000 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            transition: opacity 0.8s ease;
            text-align: center;
        }

        .glow-title {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 8px;
            background: linear-gradient(135deg, #00ffcc, #ff00cc, #00ffcc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(0,255,204,0.3);
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; text-shadow: 0 0 30px rgba(0,255,204,0.3); }
            50% { opacity: 0.9; text-shadow: 0 0 50px rgba(0,255,204,0.6); }
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }

        .creator {
            font-size: 1.2rem;
            color: #ff00cc;
            letter-spacing: 2px;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .camera-hint {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,255,204,0.1);
            padding: 8px 20px;
            border-radius: 50px;
            margin-bottom: 30px;
            border: 1px solid rgba(0,255,204,0.3);
        }

        .camera-hint span {
            font-size: 1.2rem;
        }

        .camera-hint .hint-text {
            color: #00ffcc;
            font-size: 0.9rem;
        }

        .start-btn {
            padding: 16px 48px;
            font-size: 1.1rem;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            border: none;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 0, 204, 0.5);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        .start-btn:hover { 
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 0, 204, 0.8);
        }

        .hidden { opacity: 0; pointer-events: none; }
        
        /* No Hands Indicator */
        .no-hands-indicator {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #ff6666;
            z-index: 10;
            font-family: monospace;
            display: none;
            border: 1px solid rgba(255,100,100,0.3);
        }
    </style>
</head>
<body>

    <!-- Start Overlay -->
    <div id="startOverlay">
        <div class="glow-title">HANDVFX ∞ NEON AURA</div>
        <div class="subtitle">1 Hand = Naruto Mode | 2 Hands = Neon Aura Mode</div>
        <div class="creator">BY DANIYAL</div>
        <div class="camera-hint">
            <span>📷</span>
            <span class="hint-text">Open Camera</span>
        </div>
        <button class="start-btn" id="startBtn">Click To Enter In My Magical World</button>
    </div>

    <!-- Video Container -->
    <video class="input_video" autoplay playsinline></video>
    <canvas id="bgCanvas"></canvas>
    <canvas id="mainCanvas"></canvas>
    <canvas id="narutoCanvas"></canvas>

    <!-- Naruto Effect Videos -->
    <video id="n" class="fx" src="assets/naruto.mp4" muted autoplay loop playsinline></video>
    <video id="s" class="fx" src="assets/sasuke.mp4" muted autoplay loop playsinline></video>

    <!-- UI Overlay -->
    <div id="hud" class="hidden">
        <div class="panel">
            <div class="stat">Hands Detected: <span class="val" id="ui-hands">0</span></div>
            <div class="stat">FPS: <span class="val" id="ui-fps">0</span></div>
        </div>
        <div class="panel">
            <div class="stat">Gesture: <span class="val" id="ui-gesture">None</span></div>
            <div class="stat">Spread: <span class="val" id="ui-spread">0%</span></div>
        </div>
    </div>

    <div class="mode-badge hidden" id="modeBadge">
        🔥 MODE: <span id="modeName">Waiting...</span>
    </div>

    <div class="no-hands-indicator" id="noHandsIndicator">
        ⚠️ NO HANDS DETECTED — NO VFX RUNNING
    </div>

    <div id="themes" class="hidden">
        <button class="theme-btn active" data-theme="Rainbow">🌈 Rainbow</button>
        <button class="theme-btn" data-theme="Cyberpunk">💀 Cyberpunk</button>
        <button class="theme-btn" data-theme="Lava">🌋 Lava</button>
        <button class="theme-btn" data-theme="Ocean">🌊 Ocean</button>
        <button class="theme-btn" data-theme="Galaxy">✨ Galaxy</button>
    </div>

<script>
// ============================================================
//  FIX 1: DEFINE HAND_CONNECTIONS (MISSING)
// ============================================================
const HAND_CONNECTIONS = [
    [0,1], [1,2], [2,3], [3,4],
    [0,5], [5,6], [6,7], [7,8],
    [0,9], [9,10], [10,11], [11,12],
    [0,13], [13,14], [14,15], [15,16],
    [0,17], [17,18], [18,19], [19,20],
    [5,9], [9,13], [13,17]
];

// ============================================================
//  FIX 2: EXTRACT DRAWING FUNCTIONS
// ============================================================
const { drawConnectors, drawLandmarks } = window;

// ============================================================
//  GLOBALS
// ============================================================
const videoElement = document.querySelector('.input_video');
const bgCanvas = document.getElementById('bgCanvas');
const mainCanvas = document.getElementById('mainCanvas');
const narutoCanvas = document.getElementById('narutoCanvas');
const bgCtx = bgCanvas.getContext('2d');
const ctx = mainCanvas.getContext('2d');
const narutoCtx = narutoCanvas.getContext('2d');

// Naruto elements
const nVideo = document.getElementById('n');
const sVideo = document.getElementById('s');

let width = window.innerWidth;
let height = window.innerHeight;
let time = 0;
let lastTime = performance.now();
let framesThisSecond = 0;
let lastFpsTime = performance.now();

let currentHands = [];
let handVelocities = 0;
let currentMode = "none";

// Naruto mode state
let pwr = [0, 0];
let wasOpen = [false, false];
let lastHandCount = 0;

// Theme Config
let currentTheme = 'Rainbow';
const themes = {
    'Rainbow':   (t, index, total) => `hsl(${(t * 100 + index * (360/total)) % 360}, 100%, 60%)`,
    'Cyberpunk': (t, index, total) => (index % 2 === 0) ? '#ff003c' : '#00f0ff',
    'Lava':      (t, index, total) => `hsl(${(10 + (index * 10)) % 40}, 100%, ${50 + Math.sin(t)*10}%)`,
    'Ocean':     (t, index, total) => `hsl(${180 + (index * 20)}, 100%, 60%)`,
    'Galaxy':    (t, index, total) => `hsl(${260 + Math.sin(t*2 + index)*40}, 100%, 65%)`
};

// Physics for Neon mode
let particles = [];
let ripples = [];
const FINGER_TIPS = [4, 8, 12, 16, 20];

// Background stars
let stars = [];
const STAR_COUNT = 150;

// Audio
let audioCtx = null;
let humOsc = null;
let humGain = null;

// UI Elements
const uiHands = document.getElementById('ui-hands');
const uiFps = document.getElementById('ui-fps');
const uiGesture = document.getElementById('ui-gesture');
const uiSpread = document.getElementById('ui-spread');
const modeNameSpan = document.getElementById('modeName');
const modeBadge = document.getElementById('modeBadge');
const noHandsIndicator = document.getElementById('noHandsIndicator');

let lastPinchState = [false, false];

// ============================================================
//  FIX 3: VIDEO LOADING WITH ERROR HANDLING
// ============================================================
function setupVideos() {
    // Ensure videos are muted for autoplay
    nVideo.muted = true;
    sVideo.muted = true;
    
    // Add error handlers
    nVideo.addEventListener('error', (e) => {
        console.error('Naruto video error:', e);
        console.log('Video path:', nVideo.src);
    });
    
    sVideo.addEventListener('error', (e) => {
        console.error('Sasuke video error:', e);
        console.log('Video path:', sVideo.src);
    });
    
    nVideo.addEventListener('loadeddata', () => {
        console.log('Naruto video loaded successfully');
    });
    
    sVideo.addEventListener('loadeddata', () => {
        console.log('Sasuke video loaded successfully');
    });
    
    // Try to load videos
    nVideo.load();
    sVideo.load();
}

// ============================================================
//  UTILITY FUNCTIONS
// ============================================================
function getDist(p1, p2) {
    return Math.hypot(p1.x - p2.x, p1.y - p2.y);
}

function mapToCanvas(point) {
    return { x: point.x * width, y: point.y * height };
}

// ============================================================
//  RESET ALL VFX
// ============================================================
function resetAllVFX() {
    pwr = [0, 0];
    wasOpen = [false, false];
    nVideo.style.display = 'none';
    sVideo.style.display = 'none';
    nVideo.pause();
    sVideo.pause();
    nVideo.currentTime = 0;
    sVideo.currentTime = 0;
    
    if (narutoCtx) narutoCtx.clearRect(0, 0, width, height);
    if (ctx) ctx.clearRect(0, 0, width, height);
    if (bgCtx) bgCtx.clearRect(0, 0, width, height);
    
    particles = [];
    ripples = [];
    
    if (humGain && audioCtx) {
        humGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
    }
    
    lastPinchState = [false, false];
    
    if (uiGesture) uiGesture.innerText = "None";
    if (uiSpread) uiSpread.innerText = "0%";
}

// ============================================================
//  NARUTO MODE FUNCTIONS
// ============================================================
function checkOpen(pts) {
    let count = 0;
    const wrist = pts[0];
    const tips = [8, 12, 16, 20];
    const pips = [6, 10, 14, 18];
    for (let i = 0; i < tips.length; i++) {
        const tip = pts[tips[i]];
        const pip = pts[pips[i]];
        if (Math.hypot(tip.x - wrist.x, tip.y - wrist.y) > Math.hypot(pip.x - wrist.x, pip.y - wrist.y)) count++;
    }
    return count >= 3;
}

function renderNarutoMode(hands, handedness) {
    if (!hands || hands.length === 0) {
        nVideo.style.display = 'none';
        sVideo.style.display = 'none';
        narutoCtx.clearRect(0, 0, width, height);
        return;
    }
    
    narutoCanvas.width = width;
    narutoCanvas.height = height;
    narutoCtx.clearRect(0, 0, width, height);
    
    let fL = false;
    let fR = false;
    
    nVideo.style.display = 'none';
    sVideo.style.display = 'none';
    
    hands.forEach((pts, i) => {
        const label = handedness[i].label;
        const isR = label === 'Right';
        const idx = isR ? 1 : 0;
        
        narutoCtx.save();
        narutoCtx.shadowBlur = 10;
        narutoCtx.shadowColor = '#00fbff';
        drawConnectors(narutoCtx, pts, HAND_CONNECTIONS, {color: '#00d4ff', lineWidth: 3});
        drawLandmarks(narutoCtx, pts, {color: '#ffffff', lineWidth: 1, radius: 2});
        narutoCtx.restore();
        
        const open = checkOpen(pts);
        pwr[idx] += open ? 0.05 : -0.15;
        pwr[idx] = Math.max(0, Math.min(1, pwr[idx]));
        
        if (open && !wasOpen[idx]) {
            const vid = isR ? sVideo : nVideo;
            vid.currentTime = 0;
            vid.play().catch(e => console.log('Video play error:', e));
        }
        wasOpen[idx] = open;
        
        const wrist = pts[0];
        const knk = pts[9];
        
        if (pwr[idx] > 0.01) {
            if (isR) {
                fR = true;
                const tx = (wrist.x + knk.x) / 2;
                const ty = (wrist.y + knk.y) / 2;
                // FIX 4: Correct positioning (removed 1 - tx for proper mirroring)
                sVideo.style.left = `${tx * window.innerWidth}px`;
                sVideo.style.top = `${ty * window.innerHeight}px`;
                sVideo.style.display = 'block';
                sVideo.style.opacity = pwr[idx];
            } else {
                fL = true;
                const dx = knk.x - wrist.x;
                const dy = knk.y - wrist.y;
                const tx = knk.x + (dx * 0.8);
                const ty = knk.y + (dy * 0.8);
                // FIX 4: Correct positioning
                nVideo.style.left = `${tx * window.innerWidth}px`;
                nVideo.style.top = `${(ty * window.innerHeight) - 120}px`;
                nVideo.style.display = 'block';
                nVideo.style.opacity = pwr[idx];
            }
        }
    });
    
    if (!fL) {
        pwr[0] = Math.max(0, pwr[0] - 0.15);
        if (pwr[0] > 0.01) { nVideo.style.display = 'block'; nVideo.style.opacity = pwr[0]; }
        else { nVideo.style.display = 'none'; }
        wasOpen[0] = false;
    }
    if (!fR) {
        pwr[1] = Math.max(0, pwr[1] - 0.15);
        if (pwr[1] > 0.01) { sVideo.style.display = 'block'; sVideo.style.opacity = pwr[1]; }
        else { sVideo.style.display = 'none'; }
        wasOpen[1] = false;
    }
}

// ============================================================
//  NEON MODE FUNCTIONS (same as before)
// ============================================================
function initStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
        stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 2 + 1,
            alpha: Math.random() * 0.5 + 0.3,
            speed: Math.random() * 2 + 0.5
        });
    }
}

function drawBackgroundStars() {
    bgCtx.globalCompositeOperation = 'destination-out';
    bgCtx.fillStyle = `rgba(0, 0, 0, ${0.15 + Math.min(handVelocities * 10, 0.5)})`;
    bgCtx.fillRect(0, 0, width, height);
    bgCtx.globalCompositeOperation = 'source-over';
    
    for (let s of stars) {
        bgCtx.beginPath();
        bgCtx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
        bgCtx.fillStyle = themes[currentTheme](time, 1, 1);
        bgCtx.globalAlpha = s.alpha + Math.sin(time * s.speed) * 0.2;
        bgCtx.fill();
    }
    bgCtx.globalAlpha = 1;
    
    if (handVelocities > 0.02 && Math.random() > 0.95) {
        for (let i = 0; i < 3; i++) {
            createParticles({ x: Math.random() * width, y: Math.random() * height }, 
                themes[currentTheme](time, 1, 1), 2);
        }
    }
}

function createParticles(pos, color, count = 3) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: pos.x,
            y: pos.y,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: 1.0,
            color: color,
            size: Math.random() * 3 + 1
        });
    }
}

function createShockwave(pos, color) {
    ripples.push({
        x: pos.x,
        y: pos.y,
        radius: 0,
        maxRadius: 150 + Math.random() * 100,
        life: 1.0,
        color: color
    });
}

function updatePhysics() {
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.02;
        p.vy += 0.1;
        
        if (p.life <= 0) {
            particles.splice(i, 1);
        } else {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fill();
        }
    }
    
    for (let i = ripples.length - 1; i >= 0; i--) {
        let r = ripples[i];
        r.radius += (r.maxRadius - r.radius) * 0.1;
        r.life -= 0.03;
        
        if (r.life <= 0) {
            ripples.splice(i, 1);
        } else {
            ctx.beginPath();
            ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
            ctx.strokeStyle = r.color;
            ctx.lineWidth = 4 * r.life;
            ctx.globalAlpha = r.life;
            ctx.stroke();
        }
    }
    ctx.globalAlpha = 1.0;
}

function detectGesturesNeon() {
    if (!currentHands.length) return;
    
    currentHands.forEach((hand, idx) => {
        const thumb = hand[4];
        const index = hand[8];
        const dist = getDist(thumb, index);
        const isPinching = dist < 0.05;
        
        if (isPinching && !lastPinchState[idx]) {
            const midpoint = { x: (thumb.x + index.x) / 2, y: (thumb.y + index.y) / 2 };
            createShockwave(mapToCanvas(midpoint), themes[currentTheme](time, 1, 1));
            triggerZap();
            uiGesture.innerText = "PINCH!";
        }
        lastPinchState[idx] = isPinching;
    });
    
    if (currentHands[0]) {
        const spread = getDist(currentHands[0][8], currentHands[0][20]);
        let spreadPct = Math.min(Math.round(spread * 300), 100);
        uiSpread.innerText = spreadPct + '%';
        if (!lastPinchState.includes(true)) {
            uiGesture.innerText = spreadPct > 50 ? "Open Hand" : "Fist";
        }
    }
}

function renderNeonMode() {
    if (!currentHands.length) {
        ctx.clearRect(0, 0, width, height);
        bgCtx.clearRect(0, 0, width, height);
        particles = [];
        ripples = [];
        return;
    }
    
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
    ctx.fillRect(0, 0, width, height);
    ctx.globalCompositeOperation = 'screen';
    
    updatePhysics();
    
    if (currentHands.length > 0) {
        currentHands.forEach((hand, handIndex) => {
            const glowColor = themes[currentTheme](time, handIndex, 2);
            
            drawConnectors(ctx, hand, HAND_CONNECTIONS, { color: glowColor, lineWidth: 2 });
            
            ctx.shadowBlur = 15;
            ctx.shadowColor = glowColor;
            
            FINGER_TIPS.forEach((tipIndex, idx) => {
                const pt = mapToCanvas(hand[tipIndex]);
                const tipCol = themes[currentTheme](time, idx, FINGER_TIPS.length);
                
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                
                if (Math.random() > 0.6) {
                    createParticles(pt, tipCol, 1);
                }
            });
            ctx.shadowBlur = 0;
        });
        
        if (currentHands.length >= 2) {
            const h1 = currentHands[0];
            const h2 = currentHands[1];
            
            FINGER_TIPS.forEach((tipIndex, idx) => {
                const pt1 = mapToCanvas(h1[tipIndex]);
                const pt2 = mapToCanvas(h2[tipIndex]);
                const dist = getDist(pt1, pt2);
                const col = themes[currentTheme](time, idx, FINGER_TIPS.length);
                
                if (dist < 150 && Math.random() > 0.5) {
                    ctx.beginPath();
                    ctx.moveTo(pt1.x, pt1.y);
                    const midX = (pt1.x + pt2.x)/2 + (Math.random() - 0.5) * 50;
                    const midY = (pt1.y + pt2.y)/2 + (Math.random() - 0.5) * 50;
                    ctx.lineTo(midX, midY);
                    ctx.lineTo(pt2.x, pt2.y);
                    ctx.strokeStyle = '#ffffff';
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = col;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                }
                
                ctx.beginPath();
                ctx.moveTo(pt1.x, pt1.y);
                ctx.lineTo(pt2.x, pt2.y);
                let grad = ctx.createLinearGradient(pt1.x, pt1.y, pt2.x, pt2.y);
                grad.addColorStop(0, themes[currentTheme](time, idx, 5));
                grad.addColorStop(0.5, themes[currentTheme](time, idx + 1, 5));
                grad.addColorStop(1, themes[currentTheme](time, idx + 2, 5));
                ctx.strokeStyle = grad;
                ctx.lineWidth = 4;
                ctx.shadowBlur = 10;
                ctx.shadowColor = col;
                ctx.stroke();
                ctx.shadowBlur = 0;
            });
            
            let allTips = FINGER_TIPS.map(t => mapToCanvas(h1[t])).concat(
                          FINGER_TIPS.map(t => mapToCanvas(h2[t])));
            ctx.save();
            let cx = allTips.reduce((sum, p) => sum + p.x, 0) / 10;
            let cy = allTips.reduce((sum, p) => sum + p.y, 0) / 10;
            ctx.translate(cx, cy);
            ctx.rotate(time * 0.5);
            ctx.beginPath();
            for (let i = 0; i < 10; i++) {
                const t1 = { x: allTips[i].x - cx, y: allTips[i].y - cy };
                const t2 = { x: allTips[(i+3)%10].x - cx, y: allTips[(i+3)%10].y - cy };
                ctx.moveTo(t1.x, t1.y);
                ctx.lineTo(t2.x, t2.y);
            }
            ctx.strokeStyle = `rgba(255, 255, 255, 0.2)`;
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.restore();
        }
        
        detectGesturesNeon();
    }
    
    ctx.globalCompositeOperation = 'source-over';
}

// ============================================================
//  AUDIO ENGINE
// ============================================================
async function initAudio() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // FIX 5: Resume audio context on user interaction
        await audioCtx.resume();
        
        humOsc = audioCtx.createOscillator();
        humGain = audioCtx.createGain();
        humOsc.type = 'sine';
        humOsc.frequency.value = 100;
        humGain.gain.value = 0;
        humOsc.connect(humGain);
        humGain.connect(audioCtx.destination);
        humOsc.start();
        console.log('Audio initialized');
    } catch(e) {
        console.error("Web Audio API failed", e);
    }
}

function triggerZap() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function updateHum(activeHands) {
    if (!audioCtx || !humGain || currentMode !== 'neon') {
        if (humGain) humGain.gain.setTargetAtTime(0, audioCtx?.currentTime || 0, 0.1);
        return;
    }
    if (activeHands.length < 2) {
        humGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        return;
    }
    const p1 = activeHands[0][8];
    const p2 = activeHands[1][8];
    const dx = p1.x - p2.x;
    const dy = p1.y - p2.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const targetFreq = 100 + (1 - Math.min(dist, 1)) * 300;
    const targetVolume = 0.05 + (1 - Math.min(dist, 1)) * 0.15;
    humOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
    humGain.gain.setTargetAtTime(targetVolume, audioCtx.currentTime, 0.1);
}

// ============================================================
//  RENDER LOOP
// ============================================================
function renderLoop(timestamp) {
    requestAnimationFrame(renderLoop);
    
    let dt = (timestamp - lastTime) / 1000;
    lastTime = timestamp;
    time += dt;
    
    framesThisSecond++;
    if (timestamp > lastFpsTime + 1000) {
        uiFps.innerText = framesThisSecond;
        framesThisSecond = 0;
        lastFpsTime = timestamp;
    }
    
    const handCount = currentHands.length;
    uiHands.innerText = handCount;
    
    let newMode = "none";
    
    if (handCount === 0) {
        newMode = "none";
    } else if (handCount === 1) {
        newMode = "naruto";
    } else if (handCount >= 2) {
        newMode = "neon";
    }
    
    if (newMode !== currentMode) {
        currentMode = newMode;
        
        if (currentMode === "none") {
            modeNameSpan.innerText = "NO HANDS 👋";
            noHandsIndicator.style.display = "block";
            narutoCanvas.style.display = 'none';
            mainCanvas.style.display = 'none';
            bgCanvas.style.display = 'none';
            resetAllVFX();
            nVideo.style.display = 'none';
            sVideo.style.display = 'none';
            
        } else if (currentMode === "naruto") {
            modeNameSpan.innerText = "🔥 NARUTO MODE (1 HAND)";
            noHandsIndicator.style.display = "none";
            narutoCanvas.style.display = 'block';
            mainCanvas.style.display = 'none';
            bgCanvas.style.display = 'none';
            ctx.clearRect(0, 0, width, height);
            bgCtx.clearRect(0, 0, width, height);
            particles = [];
            ripples = [];
            if (humGain && audioCtx) {
                humGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
            }
            
        } else if (currentMode === "neon") {
            modeNameSpan.innerText = "🌌 NEON AURA MODE (2 HANDS)";
            noHandsIndicator.style.display = "none";
            narutoCanvas.style.display = 'none';
            mainCanvas.style.display = 'block';
            bgCanvas.style.display = 'block';
            narutoCtx.clearRect(0, 0, width, height);
            nVideo.style.display = 'none';
            sVideo.style.display = 'none';
            pwr = [0, 0];
            if (stars.length === 0) initStars();
        }
    }
    
    if (currentMode === "naruto" && handCount === 1) {
        if (window.handednessData) {
            renderNarutoMode(currentHands, window.handednessData);
        }
    } else if (currentMode === "neon" && handCount >= 2) {
        drawBackgroundStars();
        renderNeonMode();
        updateHum(currentHands);
    } else if (currentMode === "none") {
        if (nVideo.style.display !== 'none') nVideo.style.display = 'none';
        if (sVideo.style.display !== 'none') sVideo.style.display = 'none';
        if (pwr[0] !== 0 || pwr[1] !== 0) pwr = [0, 0];
    }
    
    if (handCount === 0 && uiGesture) {
        uiGesture.innerText = "None";
        uiSpread.innerText = "0%";
    }
}

// ============================================================
//  MEDIAPIPE INITIALIZATION
// ============================================================
function initMediaPipe() {
    const hands = new Hands({locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }});
    
    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.7,
        minTrackingConfidence: 0.7
    });
    
    hands.onResults((results) => {
        if (!audioCtx) return;
        
        if (currentHands.length > 0 && results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
            let vSum = 0;
            const oldP = currentHands[0]?.[8];
            const newP = results.multiHandLandmarks[0]?.[8];
            if (oldP && newP) {
                vSum += getDist(oldP, newP);
                handVelocities = vSum || 0;
            }
        } else {
            handVelocities = 0;
        }
        
        currentHands = results.multiHandLandmarks || [];
        window.handednessData = results.multiHandedness || [];
    });
    
    const camera = new Camera(videoElement, {
        onFrame: async () => {
            await hands.send({image: videoElement});
        },
        width: 1280,
        height: 720,
        facingMode: 'user'
    });
    
    camera.start();
    console.log('MediaPipe initialized');
}

    width = window.innerWidth;
    height = window.innerHeight;
    bgCanvas.width = width;
    bgCanvas.height = height;
    mainCanvas.width = width;
    mainCanvas.height = height;
    narutoCanvas.width = width;
    narutoCanvas.height = height;

// Setup videos
setupVideos();

// Theme switcher
document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        currentTheme = e.target.getAttribute('data-theme');
        document.documentElement.style.setProperty('--accent', themes[currentTheme](0, 1, 1));
    });
});

// Start button
document.getElementById('startBtn').addEventListener('click', async () => {
    document.getElementById('startOverlay').classList.add('hidden');
    document.getElementById('hud').classList.remove('hidden');
    document.getElementById('themes').classList.remove('hidden');
    modeBadge.classList.remove('hidden');
    await initAudio();
    initMediaPipe();
    requestAnimationFrame(renderLoop);
});
